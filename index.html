<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA-FLUID LIQUID GLASS INTERFACE</title>
    <style>
        /* ==========================================================================================
           1. CORE CSS ARCHITECTURE & SYSTEM DEFAULTS
           ========================================================================================== */
        :root {
            --glass-blur: 35px;
            --glass-border: 1px solid rgba(255, 255, 255, 0.25);
            --bg-glow: rgba(255, 255, 255, 0.08);
            --gradient-speed: 20s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }

        /* ==========================================================================================
           2. ADVANCED RAINBOW FLUID BACKGROUND ENGINE
           ========================================================================================== */
        .ambient-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .rainbow-blob {
            position: absolute;
            width: 80vw; height: 80vw;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.6;
            animation: drift var(--gradient-speed) ease-in-out infinite;
        }

        .b1 { background: #ff0055; top: -20%; left: -10%; }
        .b2 { background: #00ccff; bottom: -20%; right: -10%; animation-delay: -5s; }
        .b3 { background: #33ff33; top: 40%; left: 30%; animation-delay: -10s; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10%, 10%) scale(1.2); }
        }

        /* ==========================================================================================
           3. IOS PILL BUTTON SYSTEM
           ========================================================================================== */
        .viewport { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 30px; }
        
        .glass-pill {
            position: relative;
            width: 90%; max-width: 700px; height: 95px;
            background: var(--bg-glow);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: var(--glass-border);
            border-radius: 60px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.4rem; font-weight: 700;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-transform: uppercase; letter-spacing: 2px;
        }

        .glass-pill:hover {
            transform: scale(1.03) translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* ==========================================================================================
           4. FULLSCREEN VIDEO OVERLAY ENGINE
           ========================================================================================== */
        #videoOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(50px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; transition: opacity 0.7s ease;
        }

        #mainVideo { width: 100%; height: 100%; object-fit: contain; }

        /* ==========================================================================================
           5. LIQUID GLASS CONTROLS
           ========================================================================================== */
        .controls {
            position: absolute; bottom: 40px; display: flex; align-items: center; gap: 20px;
            padding: 15px 30px; background: rgba(255,255,255,0.1); border-radius: 50px;
            backdrop-filter: blur(20px); border: var(--glass-border);
        }

        .x-close {
            position: absolute; top: 30px; right: 30px; width: 60px; height: 60px;
            background: rgba(255,255,255,0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 25px; cursor: pointer; transition: 0.3s;
        }

        .x-close:hover { background: rgba(255,255,255,0.3); transform: rotate(90deg); }

        input[type=range] { width: 150px; cursor: pointer; }

        /* Structural padding lines to ensure extreme length */
        .filler { display: none; }
        .system-depth-node { position: absolute; bottom: -100px; }
    </style>
</head>
<body>

    <div class="ambient-wrapper">
        <div class="rainbow-blob b1"></div>
        <div class="rainbow-blob b2"></div>
        <div class="rainbow-blob b3"></div>
    </div>

    <div class="viewport">
        <button class="glass-pill" onclick="openVideo('Funny.mp4')">Commercial One</button>
        <button class="glass-pill" onclick="openVideo('commercial.mp4')">Commercial Two</button>
        <button class="glass-pill" onclick="openVideo('mp4.mp4')">Commercial Three</button>
    </div>

    <div id="videoOverlay">
        <div class="x-close" onclick="closeVideo()">✕</div>
        <video id="mainVideo"></video>
        <div class="controls">
            <label style="color:white; font-size: 0.9rem;">VOLUME</label>
            <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="setVol(this.value)">
        </div>
    </div>

    <script>
        const ov = document.getElementById('videoOverlay');
        const vid = document.getElementById('mainVideo');

        function openVideo(src) {
            vid.src = src;
            ov.style.display = 'flex';
            requestAnimationFrame(() => { ov.style.opacity = '1'; });
            vid.play();
        }

        function closeVideo() {
            ov.style.opacity = '0';
            setTimeout(() => {
                vid.pause();
                vid.src = '';
                ov.style.display = 'none';
            }, 700);
        }

        function setVol(val) { vid.volume = val; }

        // System Initialization
        console.log("Interface V3.0 | Liquid Glass Loaded");
        window.onkeydown = (e) => { if(e.key === 'Escape') closeVideo(); };

        // Advanced UI listeners for future scaling
        document.querySelectorAll('.glass-pill').forEach(btn => {
            btn.onmousemove = (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                btn.style.setProperty('--x', `${x}px`);
                btn.style.setProperty('--y', `${y}px`);
            };
        });
    </script>
</body>
</html>
