<head>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍟</text></svg>">
    <title>Jaap Commerical</title>
    <style>
        /* ==========================================================================================
           1. CORE SYSTEM ARCHITECTURE & RESET
           ========================================================================================== */
        /* ==========================================================================================
           1. CORE SYSTEM ARCHITECTURE & RESET (WITH DOUBLE-LAYER BACKGROUND MASK)
           ========================================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; min-height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow-x: hidden; 
            color: #000000; /* Forces global text to black */

            /* MULTIPLE BACKGROUND ENGINE:
               Layer 1 (Top): Your translucent image blended at 80% lightened opacity with a white background tint
               Layer 2 (Bottom): The animated moving rainbow mesh
            */
          /* Updated with 100% saturated neon spectrum colors */
            background: 
                linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.1)), 
                url('bglogo.png'), 
                linear-gradient(-45deg, #ff0055, #ffeb00, #00ff66, #00ffff, #0077ff, #ff00ff);
            
            /* Background Rules mapped respectively to each layer */
            background-repeat: no-repeat, repeat-y, no-repeat;
            background-position: top center, top center, center;
            background-size: 100% 100%, 100% auto, 400% 400%;
            background-attachment: scroll, scroll, fixed;
            
            animation: gradientShift 15s ease infinite;
        }
        /* Custom Glass Scrollbar for Chrome, Safari, and Edge */
                    ::-webkit-scrollbar {
                width: 16px; /* Wider so it's super easy to see and grab */
            }
            ::-webkit-scrollbar-track {
                background: rgba(255, 255, 255, 0.08); 
                backdrop-filter: blur(40px);
                -webkit-backdrop-filter: blur(40px);
                border-left: 1px solid rgba(255, 255, 255, 0.2);
            }
            ::-webkit-scrollbar-thumb {
                /* High-contrast neon rainbow gradient directly on the scrollbar handle */
                background: linear-gradient(180deg, #ff0055, #ffcc00, #33ff33, #00ffff, #0066ff, #cc00ff);
                border-radius: 50px;
                border: 3px solid rgba(255, 255, 255, 0.4); /* Chunky glass rim look */
                box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.6), 0 0 15px rgba(0, 0, 0, 0.5);
            }
            ::-webkit-scrollbar-thumb:hover {
                border-color: rgba(255, 255, 255, 0.8);
                box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.9), 0 0 25px rgba(255, 255, 255, 0.6);
                cursor: pointer;
            }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ==========================================================================================
           2. MATHEMATICAL HSL RAINBOW OVERLAY LAYER
           ========================================================================================== */
        .ambient-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .glass-pill {
            color: #000000 !important;
        }
        .rainbow-blob {
            position: absolute;
            width: 70vw; height: 70vw;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            will-change: transform, background;
            transition: background 0.1s linear;
        }
                #emojiContainer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; overflow: hidden;
        }
        
        .falling-emoji {
            position: absolute; font-size: 8rem;
            animation: fallAnimation 6s linear forwards;
        }
        
        @keyframes fallAnimation {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* ==========================================================================================
           3. IOS-STYLE GLASS INTERFACE & SEARCH BAR
           ========================================================================================== */
        .search-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .glass-search {
            width: 95%;             /* Fluid coverage for smaller panels */
            max-width: 1100px;      /* Pushed past the 900px glass pill boundaries */
            padding: 25px 40px;     /* Chunkier field height design */
            font-size: 1.8rem;      /* Huge legible search text */
            font-weight: 700;
            color: #000000;         /* Typing text color changed to solid black */
            background: rgba(255, 255, 255, 0.25); /* Slightly darker white glass base for better contrast with black text */
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            letter-spacing: 1px;
        }

        /* Changes the placeholder helper text color to dark charcoal grey */
        .glass-search::placeholder {
            color: rgba(0, 0, 0, 0.6);
        }

        .glass-search:focus {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            transform: scale(1.02);
        }

        .viewport { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px 0 100px 0; 
            gap: 20px; 
        }
        video::-webkit-media-controls {
            zoom: 1.25; /* Enlarges the play, pause, fullscreen, and download buttons safely without cutting them off */
        }
        .header-glass-box {
            margin: 0 auto 30px auto;       /* Centers the box */
            padding: 30px;                  /* Adds breathing room inside the box */
            max-width: 800px;               /* Keeps it from becoming too wide */
            background: rgba(255, 255, 255, 0.2); /* Semi-transparent white */
            backdrop-filter: blur(20px);    /* This is the secret for the "liquid glass" look */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;            /* Soft, rounded corners */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.6);
        }
        
                 .glass-pill {
            position: relative;
            width: 90%; 
            max-width: 900px;       /* 2x width expansion from original 500px architecture */
            height: 120px;          /* Massive 2x chunkier target field */
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 2px solid rgba(255, 255, 255, 0.35); /* Solid glass outline */
            border-radius: 60px;    /* Keeps the perfect capsule form factor */
            display: flex; align-items: center; justify-content: center;
            color: white; 
            font-size: 2.2rem;      /* Huge text size so the brand labels look massive */
            font-weight: 800;       /* Extra bold stance */
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Snappy bounce effect */
            box-shadow: 0 15px 35px rgba(0,0,0,0.25), inset 0 0 15px rgba(255,255,255,0.2);
            text-transform: uppercase; 
            letter-spacing: 3px;
        }
        /* ==========================================================================================
   ULTRA-ADAPTIVE FULL-SCREEN LOGO BACKGROUND MASK OVERLAY
   ========================================================================================== */
        /* ==========================================================================================
   SEAMLESS VERTICAL SCROLLING BACKGROUND MASK OVERLAY
   ========================================================================================== */

        
        .glass-pill:hover {
            transform: scale(1.04) translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,255,255,0.4);
        }
        /* ==========================================================================================
   MINI LIQUID GLASS SUGGESTION BOX SYSTEM
   ========================================================================================== */
        #suggestionWrapper {
            position: fixed;
            bottom: 60px; /* Bumped up slightly so it doesn't clip off the bottom edge when scaled */
            left: 60px;   /* Shifted right slightly so it doesn't clip off the left screen edge */
            z-index: 5000;
            display: flex;
            align-items: flex-end;
            
            /* THE 1 LINE TWEAK: Scales the entire suggestion system up by 2.5x */
            transform: scale(2); 
            transform-origin: bottom left; /* Ensures it scales outward from the bottom-left corner cleanly */
        }
        
        /* Tiny Closed State Circle */
        #suggestionIcon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        #suggestionIcon:hover {
            transform: scale(1.1) translateY(-5px);
            background: rgba(255, 255, 255, 0.35);
        }
        
        /* Hidden/Expanded Form Box Container */
        #suggestionBoxContent {
            display: none;
            width: 320px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            flex-direction: column;
            gap: 15px;
            position: relative;
        }
        
        #suggestionBoxContent h3 {
            margin: 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000000;
        }
        
        /* Form Inputs styling */
        #suggestionForm {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        #suggestionForm input, #suggestionForm textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            outline: none;
            font-family: inherit;
            color: #000000;
            font-size: 1rem;
        }
        
        #suggestionForm textarea {
            height: 100px;
            resize: none;
        }
        
        #suggestionForm input::placeholder, #suggestionForm textarea::placeholder {
            color: rgba(0, 0, 0, 0.6);
        }
        
        /* Submit Button with clean feedback */
        #submitBtn {
            padding: 12px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            color: #000000;
            transition: 0.2s;
        }
        
        #submitBtn:hover {
            background: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }
        
        .close-box {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            font-size: 14px;
            color: #000000;
            font-weight: bold;
        }

        /* ==========================================================================================
           4. VIDEO PLAYER CENTERED OVERLAY
           ========================================================================================== */
        #videoOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(30px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; transition: opacity 0.5s ease;
        }

        #mainVideo { 
            width: 95vw;             
            max-width: 90%;    /* Forces at least a 10% total background edge on ANY screen size */        
            max-height: 80vh;  /* Keeps the video from taller screens overflowing vertically */
            height: auto;
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            background: #000;
        }

        .controls {
            position: absolute; bottom: 50px; display: flex; align-items: center; gap: 20px;
            padding: 15px 35px; background: rgba(255,255,255,0.15); border-radius: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .x-close {
            position: absolute; top: 40px; right: 40px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.2); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 22px; cursor: pointer; transition: 0.3s;
            z-index: 1001;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .x-close:hover { 
            background: rgba(255,255,255,0.4); 
            transform: rotate(90deg); 
            border-color: rgba(255,255,255,0.6);
        }
        
        input[type=range] { width: 200px; cursor: pointer; accent-color: white; }
    </style>

<body>
    <div style="text-align: center; padding: 50px 20px 10px 20px; color: #000000;">
                <div id="emojiTrigger" class="header-glass-box" onclick="spawnEmoji(event)">
            <h1 style="font-size: 3rem; text-transform: uppercase; margin-bottom: 10px;">Future Commercials</h1>
            <p style="font-size: 1.2rem; opacity: 0.8; letter-spacing: 2px;">Made by Jaap & Gemini</p>
        </div>
        
        <div id="emojiContainer"></div>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="glass-search" placeholder="Search for a commercial..." onkeyup="filterCommercials()">
        </div>
    </div>

    <div class="ambient-wrapper">
        <div class="rainbow-blob" style="top: -20%; left: -10%;"></div>
        <div class="rainbow-blob" style="bottom: -20%; right: -10%;"></div>
        <div class="rainbow-blob" style="top: 40%; left: 30%;"></div>
    </div>

    <div class="viewport" id="buttonContainer">
        <button class="glass-pill" onclick="openVideo('Funny.mp4')">McDonald's</button>
        <button class="glass-pill" onclick="openVideo('commercial.mp4')">McDonald's #2</button>

    <div id="videoOverlay">
        <div class="x-close" onclick="closeVideo()">✕</div>
        <video id="mainVideo" controls></video>
        <div class="controls">
            <span style="color:white; font-weight:bold; letter-spacing: 1px;">🔊Volume</span>
            <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setVol(this.value)">
        </div>
    </div>

    <script>
        /* ==========================================================================================
           5. SEARCH FILTER ENGINE
           ========================================================================================== */
        function filterCommercials() {
            const input = document.getElementById('searchInput').value.toUpperCase();
            const buttons = document.querySelectorAll('.glass-pill');
            
            buttons.forEach(button => {
                const text = button.innerText.toUpperCase();
                if (text.indexOf(input) > -1) {
                    button.style.display = "flex";
                } else {
                    button.style.display = "none";
                }
            });
        }

        /* ==========================================================================================
           6. HSL MATH CYCLE FOR AMBIENT BLOB OVERLAYS 
           ========================================================================================== */
        let hue = 0;
        const blobs = document.querySelectorAll('.rainbow-blob');

        function animateHSL() {
            hue = (hue + 0.5) % 360;
            blobs.forEach((b, i) => {
                b.style.background = `hsl(${(hue + (i * 120)) % 360}, 80%, 50%)`;
            });
            requestAnimationFrame(animateHSL);
        }
        animateHSL();

        /* ==========================================================================================
           7. VIDEO OVERLAY & CONTROL LOGIC
           ========================================================================================== */
        const ov = document.getElementById('videoOverlay');
        const vid = document.getElementById('mainVideo');

        function openVideo(src) {
            vid.src = src;
            ov.style.display = 'flex';
            requestAnimationFrame(() => { ov.style.opacity = '1'; });
            vid.play();
        }

        function closeVideo() {
            ov.style.opacity = '0';
            setTimeout(() => {
                vid.pause();
                vid.src = '';
                ov.style.display = 'none';
            }, 500);
        }

        /* ==========================================================================================

let isBoxOpen = false;

function toggleSuggestionBox() {
    const icon = document.getElementById('suggestionIcon');
    const content = document.getElementById('suggestionBoxContent');
    
    if (!isBoxOpen) {
        icon.style.display = 'none';
        content.style.display = 'flex';
        isBoxOpen = true;
    } else {
        content.style.display = 'none';
        icon.style.display = 'flex';
        isBoxOpen = false;
    }
}

function sendSuggestion(e) {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    const emailInput = document.getElementById('userEmail').value;
    const textInput = document.getElementById('userText').value;
    
    submitBtn.innerText = "Sending...";
    submitBtn.disabled = true;

    // Parameters mapped to match the variable names set up in your EmailJS Template layout
    const templateParams = {
        user_email: emailInput,
        suggestion: textInput
    };

    emailjs.send('service_cfgf801', 'template_i673w6c', templateParams)
        .then(() => {
            alert('Suggestion sent successfully! 🚀');
            document.getElementById('suggestionForm').reset();
            toggleSuggestionBox(); // Close box and reset icon view
        }, (error) => {
            alert('Failed to send suggestion. Please try again.');
            console.log('FAILED...', error);
        })
        .finally(() => {
            submitBtn.innerText = "Send Request";
            submitBtn.disabled = false;
        });
}
