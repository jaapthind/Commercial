<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍟</text></svg>">
    <title>Jaap-Commerical</title>
    <style>
        /* ==========================================================================================
           1. CORE SYSTEM ARCHITECTURE & RESET
           ========================================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; min-height: 100%; 
            /* Animated Rainbow Background Gradient */
            background: linear-gradient(-45deg, #ff0055, #ffcc00, #33ff33, #00ffff, #0066ff, #cc00ff);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow-x: hidden; 
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ==========================================================================================
           2. MATHEMATICAL HSL RAINBOW OVERLAY LAYER
           ========================================================================================== */
        .ambient-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        
        .rainbow-blob {
            position: absolute;
            width: 70vw; height: 70vw;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            will-change: transform, background;
            transition: background 0.1s linear;
        }

        /* ==========================================================================================
           3. IOS-STYLE GLASS INTERFACE
           ========================================================================================== */
        .viewport { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            /* Remove height: 100vh; */
            min-height: 100vh; /* Ensures it at least fills the screen */
            padding: 50px 0;    /* Adds space at the top and bottom so buttons aren't flush against the edges */
            gap: 30px; 
        }
        
        .glass-pill {
            position: relative;
            width: 90%; max-width: 700px; height: 95px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 60px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.4rem; font-weight: 700;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-transform: uppercase; letter-spacing: 2px;
        }

        .glass-pill:hover {
            transform: scale(1.03) translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* ==========================================================================================
           4. VIDEO PLAYER CENTERED OVERLAY
           ========================================================================================== */
        #videoOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; transition: opacity 0.5s ease;
        }

        #mainVideo { 
            width: 80%; max-width: 900px; height: auto;
            border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2);
            background: #000;
        }

        .controls {
            position: absolute; bottom: 50px; display: flex; align-items: center; gap: 20px;
            padding: 20px 40px; background: rgba(255,255,255,0.2); border-radius: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3);
        }

        .x-close {
            position: absolute; top: 40px; right: 40px; width: 60px; height: 60px;
            background: rgba(255,255,255,0.2); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 25px; cursor: pointer; transition: 0.3s;
            z-index: 1001;
        }

        .x-close:hover { background: rgba(255,255,255,0.4); transform: rotate(90deg); }
        input[type=range] { width: 200px; cursor: pointer; accent-color: white; }
    </style>
</head>
<body>
    <div style="text-align: center; padding: 50px 20px; color: white;">
        <h1 style="font-size: 3rem; text-transform: uppercase; margin-bottom: 10px;">Future Commercials</h1>
        <p style="font-size: 1.2rem; opacity: 0.8; letter-spacing: 2px;">A Collab made by Jaap and Gemini</p>
    </div>

    <div class="ambient-wrapper">
        <div class="rainbow-blob" style="top: -20%; left: -10%;"></div>
        <div class="rainbow-blob" style="bottom: -20%; right: -10%;"></div>
        <div class="rainbow-blob" style="top: 40%; left: 30%;"></div>
    </div>

    <div class="viewport">
        <button class="glass-pill" onclick="openVideo('Funny.mp4')">McDonald's</button>
        <button class="glass-pill" onclick="openVideo('commercial.mp4')">McDonald's #2</button>
        <button class="glass-pill" onclick="openVideo('mp4.mp4')">McDonald's #3</button>
       <button class="glass-pill" onclick="openVideo('wendy.mp4')">Wendys #1</button>
       <button class="glass-pill" onclick="openVideo('wendy2.mp4')">Wendys #2</button>
      <button class="glass-pill" onclick="openVideo('kfc.mp4')">KFC</button>
      <button class="glass-pill" onclick="openVideo('domino.mp4')">Dominoes</button>
      <button class="glass-pill" onclick="openVideo('apple.mp4')">Apple</button>
     <button class="glass-pill" onclick="openVideo('chipotle.mp4')">Chipotle</button>
     <button class="glass-pill" onclick="openVideo('chipotle2.mp4')">Chipotle #2</button>
     <button class="glass-pill" onclick="openVideo('starbucks.mp4')">Starbucks</button>
     <button class="glass-pill" onclick="openVideo('Ford.mp4')">Ford</button>
     <button class="glass-pill" onclick="openVideo('coke.mp4')">Coca Cola</button>
    <button class="glass-pill" onclick="openVideo('nike.mp4')">Nike</button>
     <button class="glass-pill" onclick="openVideo('six.mp4')">Six Flags</button>
     <button class="glass-pill" onclick="openVideo('subway.mp4')">Subway</button>
   <button class="glass-pill" onclick="openVideo('amex.mp4')">American Express</button>
     <button class="glass-pill" onclick="openVideo('macbook.mp4')">Macbook</button>
     <button class="glass-pill" onclick="openVideo('allstate.mp4')">AllState</button>
    <button class="glass-pill" onclick="openVideo('burger.mp4')">Burger King #1</button>
 <button class="glass-pill" onclick="openVideo('burger2.mp4')">Burger King #2</button>
  <button class="glass-pill" onclick="openVideo('chevron.mp4')">Chevron</button>
   <button class="glass-pill" onclick="openVideo('chevron2.mp4')">Chevron #2</button>
    <button class="glass-pill" onclick="openVideo('dorito.mp4')">Doritoes</button>


    </div>

    <div id="videoOverlay">
        <div class="x-close" onclick="closeVideo()">✕</div>
        <video id="mainVideo" controls></video>
        <div class="controls">
            <span style="color:white; font-weight:bold;">VOLUME</span>
        <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setVol(this.value)">
        </div>
    </div>

    <script>
        /* HSL MATH CYCLE FOR AMBIENT BLOB OVERLAYS */
        let hue = 0;
        const blobs = document.querySelectorAll('.rainbow-blob');

        function animateHSL() {
            hue = (hue + 0.5) % 360;
            blobs.forEach((b, i) => {
                b.style.background = `hsl(${(hue + (i * 120)) % 360}, 80%, 50%)`;
            });
            requestAnimationFrame(animateHSL);
        }
        animateHSL();

        const ov = document.getElementById('videoOverlay');
        const vid = document.getElementById('mainVideo');

        function openVideo(src) {
            vid.src = src;
            ov.style.display = 'flex';
            requestAnimationFrame(() => { ov.style.opacity = '1'; });
            vid.play();
        }

        function closeVideo() {
            ov.style.opacity = '0';
            setTimeout(() => {
                vid.pause();
                vid.src = '';
                ov.style.display = 'none';
            }, 500);
        }

        function setVol(val) { vid.volume = val; }

        window.onkeydown = (e) => { if(e.key === 'Escape') closeVideo(); };
    </script>
</body>
</html>
