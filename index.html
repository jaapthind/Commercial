<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Vault</title>
    <style>
        /* ==========================================================================================
           1. CORE VARIABLES & LIQUID THEME
           ========================================================================================== */
        :root {
            /* Rainbow Fluid Palette */
            --fluid-1: #ff0055;
            --fluid-2: #ffcc00;
            --fluid-3: #33ff33;
            --fluid-4: #00ffff;
            --fluid-5: #0066ff;
            --fluid-6: #cc00ff;

            /* Advanced Liquid Glass Morphism */
            --glass-bg-base: rgba(255, 255, 255, 0.05);
            --glass-bg-hover: rgba(255, 255, 255, 0.15);
            --glass-gradient: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.02) 100%);
            --glass-gradient-hover: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.05) 100%);
            
            --glass-border-light: rgba(255, 255, 255, 0.1);
            --glass-border-highlight: rgba(255, 255, 255, 0.4);
            --glass-border-glow: rgba(255, 255, 255, 0.8);

            --glass-blur: 40px;
            --glass-saturate: 120%;

            /* Depth & Refraction Shadows */
            --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --shadow-glass-hover: 0 15px 40px 0 rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 255, 255, 0.15);
            --inner-glow: inset 0 0 20px rgba(255, 255, 255, 0.1);

            /* Typography */
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);

            /* Easing */
            --ease-liquid: cubic-bezier(0.25, 0.1, 0.25, 1);
            --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ==========================================================================================
           2. RESET & BASE STYLES
           ========================================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
        width: 100vw;
        min-height: 100vh;
        font-family: var(--font-main);
        color: #000;
        background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1, #ff9a9e);
        background-size: 400% 400%;
        animation: fluidGradient 15s ease infinite;
        overflow-x: hidden;
        scroll-behavior: smooth;
    }

        /* Elegant Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* ==========================================================================================
           3. LIQUID RAINBOW BACKGROUND LAYER
           ========================================================================================== */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -100;
            overflow: hidden;
            background: linear-gradient(
                -45deg, 
                var(--fluid-1), var(--fluid-2), var(--fluid-3), 
                var(--fluid-4), var(--fluid-5), var(--fluid-6)
            );
            background-size: 400% 400%;
            animation: fluidGradient 20s ease infinite;
        }

        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, #000 120%);
            mix-blend-mode: multiply;
        }

        .fluid-blob {
            position: absolute;
            filter: blur(90px);
            opacity: 0.6;
            border-radius: 50%;
            animation: blobDrift 15s ease-in-out infinite alternate;
        }

        .blob-a {
            top: -15%; left: -10%; width: 60vw; height: 60vw;
            background: var(--fluid-4);
        }
        .blob-b {
            bottom: -20%; right: -15%; width: 70vw; height: 70vw;
            background: var(--fluid-6);
            animation-delay: -5s;
        }
        .blob-c {
            top: 30%; left: 40%; width: 50vw; height: 50vw;
            background: var(--fluid-1);
            animation-delay: -10s;
        }

        #fluidCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            mix-blend-mode: screen;
            opacity: 0.4;
            pointer-events: none;
        }

        /* ==========================================================================================
           4. LAYOUT & HEADER
           ========================================================================================== */
        .app-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        .header-panel {
            padding: 25px 60px;
            background: var(--glass-gradient);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border: 1px solid var(--glass-border-light);
            border-top: 1px solid var(--glass-border-highlight);
            border-left: 1px solid var(--glass-border-highlight);
            border-radius: 100px;
            box-shadow: var(--shadow-glass);
            text-align: center;
            margin-bottom: 70px;
            position: relative;
            overflow: hidden;
        }

        .header-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
            border-radius: 100px 100px 0 0;
            pointer-events: none;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.6) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        /* ==========================================================================================
           5. LIQUID GLASS GRID
           ========================================================================================== */
        .vault-grid {
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            padding: 20px;
        }

        .glass-card {
            position: relative;
            height: 220px;
            background: var(--glass-gradient);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border: 1px solid var(--glass-border-light);
            border-top: 1px solid var(--glass-border-highlight);
            border-left: 1px solid var(--glass-border-highlight);
            border-radius: 30px;
            box-shadow: var(--shadow-glass), var(--inner-glow);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer; /* Regular cursor restored */
            transition: all 0.5s var(--ease-spring);
            overflow: hidden;
            text-decoration: none;
        }

        /* Thick glass edge highlight */
        .glass-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 30px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent 50%) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        /* Hover Physics */
        .glass-card:hover {
            transform: translateY(-12px) scale(1.02);
            background: var(--glass-gradient-hover);
            box-shadow: var(--shadow-glass-hover);
            border-color: rgba(255,255,255,0.3);
        }

        .glass-card:hover::after {
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.1) 50%) border-box;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 2;
            pointer-events: none; /* Let card handle clicks completely */
        }

        .play-icon-wrapper {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s var(--ease-spring);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .glass-card:hover .play-icon-wrapper {
            background: #ffffff;
            transform: scale(1.15);
            box-shadow: 0 10px 30px rgba(255,255,255,0.4);
            border-color: #fff;
        }

        .play-icon-wrapper svg {
            width: 28px;
            height: 28px;
            fill: #ffffff;
            margin-left: 4px;
            transition: fill 0.3s ease;
        }

        .glass-card:hover .play-icon-wrapper svg {
            fill: #000000;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        /* ==========================================================================================
           6. CINEMATIC VIDEO PLAYER (LIQUID MODAL)
           ========================================================================================== */
        .video-modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s var(--ease-liquid), visibility 0.4s;
            padding: 40px;
        }

        .video-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .player-container {
            position: relative;
            width: 100%;
            max-width: 1100px;
            background: #000;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 40px rgba(255,255,255,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: scale(0.95) translateY(20px);
            opacity: 0;
            transition: all 0.5s var(--ease-spring);
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .video-modal.active .player-container {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .main-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            display: block;
        }

        /* Top Bar & Close Button */
        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 90px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .player-container:hover .top-bar,
        .player-container.paused .top-bar,
        .player-container.active-ui .top-bar {
            opacity: 1;
        }

        .video-title {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .close-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; /* Regular cursor */
            transition: all 0.3s var(--ease-spring);
        }

        .close-btn:hover {
            background: rgba(255, 50, 50, 0.8);
            border-color: #ff3232;
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 20px rgba(255,50,50,0.6);
        }

        /* Bottom Controls */
        .controls-bar {
            position: absolute;
            bottom: 20px; left: 20px; right: 20px;
            background: var(--glass-gradient);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border-highlight);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .player-container:hover .controls-bar,
        .player-container.paused .controls-bar,
        .player-container.active-ui .controls-bar {
            opacity: 1;
            transform: translateY(0);
        }

        /* Progress Line */
        .progress-area {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            cursor: pointer; /* Regular cursor */
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #fff;
            border-radius: 4px;
            width: 0%;
            position: relative;
            box-shadow: 0 0 10px #fff;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px; top: 50%;
            transform: translateY(-50%) scale(0);
            width: 14px; height: 14px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }

        .progress-area:hover .progress-fill::after {
            transform: translateY(-50%) scale(1);
        }

        /* Buttons Row */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon-btn {
            background: none; border: none; color: #fff;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; /* Regular cursor */
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.1);
        }

        .icon-btn svg {
            width: 22px; height: 22px; fill: currentColor;
        }

        /* Volume Slider */
        .vol-wrapper {
            display: flex; align-items: center; gap: 10px;
        }

        .vol-slider {
            -webkit-appearance: none;
            width: 90px; height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px; outline: none;
            cursor: pointer;
        }

        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            background: #fff; border-radius: 50%;
            box-shadow: 0 0 5px #fff;
            transition: 0.2s;
        }

        .vol-slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        .time-text {
            font-family: monospace; font-size: 0.95rem;
            opacity: 0.9; text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .hide { display: none !important; }

        /* ==========================================================================================
           7. ANIMATIONS & RESPONSIVE
           ========================================================================================== */
        @keyframes fluidGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes blobDrift {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5%, -5%) scale(1.05); }
            66% { transform: translate(-3%, 8%) scale(0.95); }
            100% { transform: translate(0, 0) scale(1); }
        }

        @media (max-width: 900px) {
            .main-title { font-size: 2.5rem; }
            .header-panel { padding: 20px 40px; margin-bottom: 40px; }
            .video-modal { padding: 15px; }
            .controls-bar { bottom: 10px; left: 10px; right: 10px; padding: 10px 15px; }
            .vol-wrapper { display: none; } /* Simplify UI on small screens */
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="bg-overlay"></div>
        <div class="fluid-blob blob-a"></div>
        <div class="fluid-blob blob-b"></div>
        <div class="fluid-blob blob-c"></div>
    </div>

    <canvas id="fluidCanvas"></canvas>

    <div class="app-wrapper">
        <header class="header-panel">
            <h1 class="main-title">Commercials</h1>
            <p class="sub-title">Collab By Jaap + Gemini</p>
        </header>

        <main class="vault-grid" id="gridContainer">
            </main>
    </div>

    <div class="video-modal" id="modalOverlay">
        <div class="player-container" id="vidContainer">
            
            <div class="top-bar">
                <div class="video-title" id="vidTitle">Loading...</div>
                <button class="close-btn" id="closeBtn">✕</button>
            </div>

            <video class="main-video" id="vidElement" preload="metadata"></video>

            <div class="controls-bar" id="vidControls">
                <div class="progress-area" id="progArea">
                    <div class="progress-fill" id="progFill"></div>
                </div>

                <div class="controls-row">
                    <div class="controls-group">
                        <button class="icon-btn" id="playBtn">
                            <svg id="i-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            <svg id="i-pause" class="hide" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        
                        <div class="vol-wrapper">
                            <button class="icon-btn" id="muteBtn">
                                <svg id="i-vol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                                <svg id="i-mute" class="hide" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                            </button>
                            <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.01" value="0.5">
                        </div>

                        <div class="time-text">
                            <span id="t-curr">0:00</span> / <span id="t-dur">0:00</span>
                        </div>
                    </div>

                    <div class="controls-group">
                        <button class="icon-btn" id="fullBtn">
                            <svg id="i-full" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                            <svg id="i-exit" class="hide" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ==========================================================================================
           1. DATA CONFIGURATION
           ========================================================================================== */
        const ads = [
            { src: 'Funny.mp4', title: "McDonald's" },
            { src: 'commercial.mp4', title: "McDonald's #2" },
            { src: 'mp4.mp4', title: "McDonald's #3" },
            { src: 'wendy.mp4', title: "Wendys #1" },
            { src: 'wendy2.mp4', title: "Wendys #2" },
            { src: 'kfc.mp4', title: "KFC" },
            { src: 'domino.mp4', title: "Dominoes" },
            { src: 'apple.mp4', title: "Apple" },
            { src: 'chipotle.mp4', title: "Chipotle" },
            { src: 'chipotle2.mp4', title: "Chipotle #2" },
            { src: 'starbucks.mp4', title: "Starbucks" },
            { src: 'Ford.mp4', title: "Ford" },
            { src: 'coke.mp4', title: "Coca Cola" },
            { src: 'nike.mp4', title: "Nike" },
            { src: 'six.mp4', title: "Six Flags" },
            { src: 'subway.mp4', title: "Subway" },
            { src: 'amex.mp4', title: "American Express" },
            { src: 'macbook.mp4', title: "Macbook" },
            { src: 'allstate.mp4', title: "AllState" }
        ];

        /* ==========================================================================================
           2. DOM ELEMENTS
           ========================================================================================== */
        const grid = document.getElementById('gridContainer');
        
        // Modal & Player
        const modal = document.getElementById('modalOverlay');
        const vidCont = document.getElementById('vidContainer');
        const video = document.getElementById('vidElement');
        const closeBtn = document.getElementById('closeBtn');
        const titleEl = document.getElementById('vidTitle');
        
        // Controls
        const playBtn = document.getElementById('playBtn');
        const iPlay = document.getElementById('i-play');
        const iPause = document.getElementById('i-pause');
        
        const muteBtn = document.getElementById('muteBtn');
        const iVol = document.getElementById('i-vol');
        const iMute = document.getElementById('i-mute');
        const volSlider = document.getElementById('volSlider');
        
        const progArea = document.getElementById('progArea');
        const progFill = document.getElementById('progFill');
        
        const tCurr = document.getElementById('t-curr');
        const tDur = document.getElementById('t-dur');
        
        const fullBtn = document.getElementById('fullBtn');
        const iFull = document.getElementById('i-full');
        const iExit = document.getElementById('i-exit');

        const playSvg = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;

        /* ==========================================================================================
           3. RENDER CARDS & BIND CLICKS
           ========================================================================================== */
        function initGrid() {
            ads.forEach((ad) => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.innerHTML = `
                    <div class="card-content">
                        <div class="play-icon-wrapper">${playSvg}</div>
                        <div class="card-title">${ad.title}</div>
                    </div>
                `;
                
                // Directly bind standard click event
                card.addEventListener('click', () => {
                    openVideo(ad.src, ad.title);
                });
                
                grid.appendChild(card);
            });
        }

        /* ==========================================================================================
           4. VIDEO PLAYER LOGIC
           ========================================================================================== */
        let hideTimer;

        function openVideo(src, title) {
            video.src = src;
            titleEl.textContent = title;
            modal.classList.add('active');
            
            video.volume = volSlider.value;
            video.play().catch(err => console.log("Autoplay caught:", err));
            
            updatePlayIcon(true);
            document.body.style.overflow = 'hidden'; // Stop bg scroll
            resetUI();
        }

        function closeVideo() {
            modal.classList.remove('active');
            video.pause();
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(e => console.log(e));
            }
            setTimeout(() => {
                video.src = '';
                document.body.style.overflow = '';
            }, 400);
        }

        closeBtn.addEventListener('click', closeVideo);

        // Core Listeners
        video.addEventListener('timeupdate', updateProg);
        video.addEventListener('loadedmetadata', () => { tDur.textContent = formatTime(video.duration); });
        video.addEventListener('play', () => updatePlayIcon(true));
        video.addEventListener('pause', () => updatePlayIcon(false));
        video.addEventListener('ended', () => { updatePlayIcon(false); vidCont.classList.add('paused'); });
        
        // Play/Pause
        function togglePlay() {
            if (video.paused || video.ended) video.play();
            else video.pause();
        }
        
        function updatePlayIcon(playing) {
            if (playing) {
                iPlay.classList.add('hide'); iPause.classList.remove('hide');
                vidCont.classList.remove('paused');
            } else {
                iPause.classList.add('hide'); iPlay.classList.remove('hide');
                vidCont.classList.add('paused');
            }
        }

        playBtn.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);

        // Progress
        let scrubbing = false;
        function updateProg() {
            if (!scrubbing && !isNaN(video.duration)) {
                const pc = (video.currentTime / video.duration) * 100;
                progFill.style.width = `${pc}%`;
                tCurr.textContent = formatTime(video.currentTime);
            }
        }

        function scrub(e) {
            const rect = progArea.getBoundingClientRect();
            let x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
            const pc = x / rect.width;
            progFill.style.width = `${pc * 100}%`;
            video.currentTime = pc * video.duration;
            tCurr.textContent = formatTime(video.currentTime);
        }

        progArea.addEventListener('mousedown', (e) => { scrubbing = true; scrub(e); });
        window.addEventListener('mousemove', (e) => { if (scrubbing) scrub(e); });
        window.addEventListener('mouseup', () => { scrubbing = false; });

        // Volume
        function toggleMute() {
            video.muted = !video.muted;
            updateVolUI();
        }
        
        function updateVolUI() {
            if (video.muted || video.volume === 0) {
                iVol.classList.add('hide'); iMute.classList.remove('hide');
                if(video.muted) volSlider.value = 0;
            } else {
                iMute.classList.add('hide'); iVol.classList.remove('hide');
                volSlider.value = video.volume;
            }
        }

        muteBtn.addEventListener('click', toggleMute);
        volSlider.addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            video.volume = v;
            video.muted = v === 0;
            updateVolUI();
        });

        // Fullscreen
        function toggleFS() {
            if (!document.fullscreenElement) {
                vidCont.requestFullscreen().catch(e => console.log(e));
            } else {
                document.exitFullscreen();
            }
        }
        fullBtn.addEventListener('click', toggleFS);
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                iFull.classList.add('hide'); iExit.classList.remove('hide');
            } else {
                iExit.classList.add('hide'); iFull.classList.remove('hide');
            }
        });

        // Formatting
        function formatTime(sec) {
            if (isNaN(sec)) return "0:00";
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // Auto-hide UI
        function resetUI() {
            vidCont.classList.add('active-ui');
            clearTimeout(hideTimer);
            if (!video.paused) {
                hideTimer = setTimeout(() => vidCont.classList.remove('active-ui'), 2500);
            }
        }
        vidCont.addEventListener('mousemove', resetUI);
        vidCont.addEventListener('click', resetUI);

        // Keyboard
        window.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('active')) return;
            switch(e.key.toLowerCase()) {
                case 'escape': if (!document.fullscreenElement) closeVideo(); break;
                case ' ': e.preventDefault(); togglePlay(); resetUI(); break;
                case 'f': toggleFS(); break;
                case 'm': toggleMute(); break;
                case 'arrowright': video.currentTime = Math.min(video.currentTime + 5, video.duration); resetUI(); break;
                case 'arrowleft': video.currentTime = Math.max(video.currentTime - 5, 0); resetUI(); break;
            }
        });

        /* ==========================================================================================
           5. CANVAS BACKGROUND PARTICLES
           ========================================================================================== */
        const cvs = document.getElementById('fluidCanvas');
        const ctx = cvs.getContext('2d');
        let w, h, dots = [];

        function resize() {
            w = cvs.width = window.innerWidth;
            h = cvs.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Dot {
            constructor() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 1.2; this.vy = (Math.random() - 0.5) * 1.2;
                this.r = Math.random() * 1.5 + 0.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0) this.x = w; if (this.x > w) this.x = 0;
                if (this.y < 0) this.y = h; if (this.y > h) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fill();
            }
        }

        const count = window.innerWidth < 768 ? 40 : 100;
        for (let i = 0; i < count; i++) dots.push(new Dot());

        function loop() {
            ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < dots.length; i++) {
                dots[i].update(); dots[i].draw();
                for (let j = i + 1; j < dots.length; j++) {
                    const dx = dots[i].x - dots[j].x;
                    const dy = dots[i].y - dots[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255,255,255,${0.15 - dist/800})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(dots[i].x, dots[i].y);
                        ctx.lineTo(dots[j].x, dots[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(loop);
        }
        loop();

        /* Initialize App */
        initGrid();

    </script>
</body>
</html>
