<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jaap Commerical</title>
    <style>
        /* ==========================================================================================
           1. CORE SYSTEM ARCHITECTURE & RESET
           ========================================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; min-height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow-x: hidden; 
            color: #000000; 
            background: 
                linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.1)), 
                url('bglogo.png'), 
                linear-gradient(-45deg, #ff0055, #ffeb00, #00ff66, #00ffff, #0077ff, #ff00ff);
            
            background-repeat: no-repeat, repeat-y, no-repeat;
            background-position: top center, top center, center;
            background-size: 100% 100%, 100% auto, 400% 400%;
            background-attachment: scroll, scroll, fixed;
            
            animation: gradientShift 15s ease infinite;
        }
        
        ::-webkit-scrollbar {
            width: 16px; 
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff0055, #ffcc00, #33ff33, #00ffff, #0066ff, #cc00ff);
            border-radius: 50px;
            border: 3px solid rgba(255, 255, 255, 0.4); 
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.6), 0 0 15px rgba(0, 0, 0, 0.5);
        }
        ::-webkit-scrollbar-thumb:hover {
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.9), 0 0 25px rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ==========================================================================================
           2. MATHEMATICAL HSL RAINBOW OVERLAY LAYER
           ========================================================================================== */
        .ambient-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .glass-pill {
            color: #000000 !important;
        }
        .rainbow-blob {
            position: absolute;
            width: 70vw; height: 70vw;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            will-change: transform, background;
            transition: background 0.1s linear;
        }
        #emojiContainer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; overflow: hidden;
        }
        
        .falling-emoji {
            position: absolute; font-size: 8rem;
            animation: fallAnimation 6s linear forwards;
        }
        
        @keyframes fallAnimation {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* ==========================================================================================
           3. REGULAR GLASS INTERFACE & SEARCH BAR
           ========================================================================================== */
        .search-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .glass-search {
            width: 95%;             
            max-width: 1100px;      
            padding: 25px 40px;     
            font-size: 1.8rem;      
            font-weight: 700;
            color: #000000;         
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border-radius: 60px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 1px;
        }

        .glass-search::placeholder {
            color: rgba(0, 0, 0, 0.6);
        }

        .glass-search:focus {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 30px rgba(0,0,0,0.2);
            transform: scale(1.02);
        }

        /* ==========================================================================================
           ARCADE FRY CATCHER GAME CORE GRAPHICS
           ========================================================================================== */
        #fryGameCanvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 99999; display: none; pointer-events: none; background: rgba(0,0,0,0.4);
        }
        
        #fryCarton {
            position: fixed; bottom: 40px; left: 50%; width: 120px; height: 100px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px 10px 30px 30px;
            transform: translateX(-50%); pointer-events: none;
        }
        
        #fryCarton::before {
            content: ''; position: absolute; top: -3px; left: 15%; width: 70%; height: 25px;
            background: transparent; border-bottom: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
        }
        
        .falling-fry {
            position: absolute; width: 12px; height: 75px;
            background: linear-gradient(to bottom, #ffeb00, #ffaa00);
            border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #gameScore {
            position: fixed; top: 40px; right: 40px; color: #ffeb00;
            font-size: 3rem; font-weight: 900; font-family: monospace;
            text-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 5px #ff0055;
        }
        #gameInstructions {

            font-size: 1.5rem; font-weight: bold; background: rgba(0,0,0,0.6);

        }

        .viewport {

            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px 0 100px 0;

        }

            background: rgba(255, 255, 255, 0.2);

            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border-radius: 30px;            
        }
        
        .glass-pill {
            position: relative;
            width: 90%; 
            max-width: 900px;       
            height: 120px;          
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);

            font-weight: 800;

            text-transform: uppercase; 
            letter-spacing: 3px;
        }

        .glass-pill:hover {
            transform: scale(1.04) translateY(-5px);

            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        /* ==========================================================================================
           MINI REGULAR GLASS SUGGESTION BOX SYSTEM
           ========================================================================================== */
        #suggestionWrapper {
            position: fixed;
            bottom: 60px; 
            left: 60px;   
            z-index: 5000;
            display: flex;
            align-items: flex-end;
            transform: scale(2); 
            transform-origin: bottom left; 
        }
        
        #suggestionIcon {
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);

            justify-content: center;

            cursor: pointer;

        }

        #introOverlay {

        #enterText {

            text-transform: uppercase; letter-spacing: 5px;

        }
        
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.4; transform: scale(0.98); text-shadow: 0 0 10px rgba(255,255,255,0); }

            background: rgba(255, 255, 255, 0.3);
        }
        
        #suggestionBoxContent {

            padding: 25px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);

            border-radius: 25px;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }
        
        #suggestionBoxContent h3 {
            margin: 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000000;
        }
        
        #suggestionForm {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        #suggestionForm input, #suggestionForm textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            outline: none;
            font-family: inherit;
            color: #000000;
            font-size: 1rem;
        }
        
        #suggestionForm textarea {
            height: 100px;
            resize: none;
        }
        
        #suggestionForm input::placeholder, #suggestionForm textarea::placeholder {
            color: rgba(0, 0, 0, 0.6);
        }
        
        #submitBtn {
            padding: 12px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            color: #000000;
            transition: 0.2s;
        }
        
        #submitBtn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .close-box {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            font-size: 14px;
            color: #000000;
            font-weight: bold;
        }

        /* ==========================================================================================
           4. VIDEO PLAYER CENTERED OVERLAY
           ========================================================================================== */
        #videoOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(30px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; transition: opacity 0.5s ease;
        }

        #mainVideo { 
            width: 95vw;             
            max-width: 90%;    
            max-height: 80vh;  
            height: auto;
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            background: #000;
        }

        .controls {
            position: absolute; bottom: 50px; display: flex; align-items: center; gap: 20px;
            padding: 15px 35px; border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .x-close {
            position: absolute; top: 40px; right: 40px; width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 22px; cursor: pointer; transition: 0.3s;
            z-index: 1001;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .x-close:hover { 
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg); 
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        input[type=range] { width: 200px; cursor: pointer; accent-color: white; }
    </style>

<script>
function enterSite() {
    // 1. Instantly trigger the startup audio crisp and on time
    const audio = new Audio('startup.mp3');
    audio.play().catch(err => console.log("Audio play blocked:", err));

    // 2. Grab the splash screen element
    const intro = document.getElementById('introOverlay');

    // 3. Fade it out smoothly using our 2-second CSS transition
    intro.style.opacity = '0';
    intro.style.visibility = 'hidden';

    // 4. Performance cleanup: completely erase it from layout after fade finishes
    setTimeout(() => {
        intro.remove();
    }, 2000);
}
</script>

    <script>
        /* ==========================================================================================
           5. SEARCH FILTER ENGINE
           ========================================================================================== */
        function filterCommercials() {
            const input = document.getElementById('searchInput').value.toUpperCase();
            const buttons = document.querySelectorAll('.glass-pill');
            
            buttons.forEach(button => {
                const text = button.innerText.toUpperCase();
                if (text.indexOf(input) > -1) {
                    button.style.display = "flex";
                } else {
                    button.style.display = "none";
                }
            });
        }

        /* ==========================================================================================
           6. HSL MATH CYCLE FOR AMBIENT BLOB OVERLAYS 
           ========================================================================================== */
        let hue = 0;
        const blobs = document.querySelectorAll('.rainbow-blob');

        function animateHSL() {
            hue = (hue + 0.5) % 360;
            blobs.forEach((b, i) => {
                b.style.background = `hsl(${(hue + (i * 120)) % 360}, 80%, 50%)`;
            });
            requestAnimationFrame(animateHSL);
        }
        animateHSL();

        /* ==========================================================================================
           7. VIDEO OVERLAY & CONTROL LOGIC
           ========================================================================================== */
        const ov = document.getElementById('videoOverlay');
        const vid = document.getElementById('mainVideo');

        function openVideo(src) {
            vid.src = src;
            ov.style.display = 'flex';
            requestAnimationFrame(() => { ov.style.opacity = '1'; });
            vid.play();
        }

        function closeVideo() {
            ov.style.opacity = '0';
            setTimeout(() => {
                vid.pause();
                vid.src = '';
                ov.style.display = 'none';
            }, 500);
        }

let isBoxOpen = false;

function toggleSuggestionBox() {
    const icon = document.getElementById('suggestionIcon');
    const content = document.getElementById('suggestionBoxContent');
    
    if (!isBoxOpen) {
        icon.style.display = 'none';
        content.style.display = 'flex';
        isBoxOpen = true;
    } else {
        content.style.display = 'none';
        icon.style.display = 'flex';
        isBoxOpen = false;
    }
}

function sendSuggestion(e) {
    e.preventDefault();
    
    const now = new Date().getTime();
    const twentyFourHours = 24 * 60 * 60 * 1000; // 24 hours in milliseconds
    
    // 1. Fetch existing tracking data from LocalStorage
    let suggestionCount = parseInt(localStorage.getItem('suggestionCount')) || 0;
    let firstSubmissionTime = localStorage.getItem('firstSubmissionTime');

    // 2. Reset the limit tracking grid if 24 hours have completely passed
    if (firstSubmissionTime && (now - firstSubmissionTime > twentyFourHours)) {
        suggestionCount = 0;
        firstSubmissionTime = null;
        localStorage.removeItem('firstSubmissionTime');
        localStorage.setItem('suggestionCount', '0');
    }

    // 3. ENFORCEMENT GUARDRAIL: Block the user if they hit the max cap of 2
    if (suggestionCount >= 2) {
        alert("Limit reached! You can only send 2 suggestions every 24 hours. Check back tomorrow! рҹ“Ұ");
        return; // Halts the script so EmailJS never fires
    }

    // 4. PREPARE INTERFACE FEEDBACK
    const submitBtn = document.getElementById('submitBtn');
    const emailInput = document.getElementById('userEmail').value;
    const textInput = document.getElementById('userText').value;
    
    submitBtn.innerText = "Sending...";
    submitBtn.disabled = true;

    const templateParams = {
        user_email: emailInput,
        suggestion: textInput
    };

    // 5. DISPATCH VIA EMAILJS (Filled with your service and template IDs)
    emailjs.send('service_cfgf801', 'template_i673w6c', templateParams)
        .then(() => {
            alert('Suggestion sent successfully! рҹҡҖ');
            
            // 6. Update and lock the LocalStorage counters upon successful dispatch
            suggestionCount++;
            localStorage.setItem('suggestionCount', suggestionCount);
            
            if (!firstSubmissionTime) {
                localStorage.setItem('firstSubmissionTime', now);
            }

            document.getElementById('suggestionForm').reset();
            toggleSuggestionBox(); // Close box and reset icon view
        }, (error) => {
            alert('Failed to send suggestion. Please try again.');
            console.log('FAILED...', error);
        })
        .finally(() => {
            submitBtn.innerText = "Send Request";
            submitBtn.disabled = false;
        });
}
    </script>

    <div id="fryCarton"></div>
</div>

<script>
    let typedBuffer = "";
    let gameActive = false;
    let score = 0;
    let spawnTimer, gameLoopTimer;
    let currentX = window.innerWidth / 2;
    const canvas = document.getElementById('fryGameCanvas');
    const carton = document.getElementById('fryCarton');
    const scoreDisplay = document.getElementById('gameScore');

    // 1. Secret Keyword Trigger Detector ('fry')
    window.addEventListener('keydown', (e) => {
        if (!gameActive) {
            typedBuffer += e.key.toLowerCase();
            if (typedBuffer.endsWith("fry")) {
                startFryGame();
                typedBuffer = "";
            }
            if (typedBuffer.length > 10) typedBuffer = typedBuffer.substring(1);
        } else if (e.key.toLowerCase() === 'x') {
            stopFryGame();
        }
    });

    function startFryGame() {
        gameActive = true;
        score = 0;
        scoreDisplay.innerText = "00";
        canvas.style.display = 'block';
        document.body.style.cursor = 'none'; // Lock mouse cursor away
        
        // Horizontal Lock Tracking Axis Engine
        window.addEventListener('mousemove', updateCartonPosition);
        
        // Spawn loop and Game Physics calculation engine loops
        spawnTimer = setInterval(spawnGoldenFry, 400);
        gameLoopTimer = setInterval(updatePhysics, 16); // Smooth ~60fps grid check
    }

    function updateCartonPosition(e) {
        currentX = e.clientX;
        carton.style.left = currentX + 'px';
    }

    function spawnGoldenFry() {
        const fry = document.createElement('div');
        fry.className = 'falling-fry';
        fry.style.left = (Math.random() * (window.innerWidth - 40) + 20) + 'px';
        fry.style.top = '-80px';
        
        // Add random slight rotational slant to falling sticks for realism
        let slant = (Math.random() * 30 - 15);
        fry.style.transform = `rotate(${slant}deg)`;
        
        canvas.appendChild(fry);
    }

    function updatePhysics() {
        const fries = document.querySelectorAll('.falling-fry');
        const cartonRect = carton.getBoundingClientRect();

        fries.forEach(fry => {
            let topPos = parseFloat(fry.style.top);
            topPos += 7; // Downward dropping gravity speed velocity
            fry.style.top = topPos + 'px';

            const fryRect = fry.getBoundingClientRect();

            // High Precision Collision Detection Grid
            if (
                fryRect.bottom >= cartonRect.top &&
                fryRect.top <= cartonRect.bottom &&
                fryRect.right >= cartonRect.left &&
                fryRect.left <= cartonRect.right
            ) {
                fry.remove();
                score++;
                scoreDisplay.innerText = score < 10 ? "0" + score : score;
            } else if (topPos > window.innerHeight) {
                fry.remove(); // Performance Garbage Collection cleaning
            }
        });
    }

    function stopFryGame() {
        gameActive = false;
        canvas.style.display = 'none';
        document.body.style.cursor = 'default'; // Give back default mouse control
        
        window.removeEventListener('mousemove', updateCartonPosition);
        clearInterval(spawnTimer);
        clearInterval(gameLoopTimer);
        
        // Purge leftover game elements safely
        document.querySelectorAll('.falling-fry').forEach(f => f.remove());
    }
</script>
