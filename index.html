<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA-DYNAMIC HSL LIQUID GLASS</title>
    <style>
        /* ==========================================================================================
           1. CORE SYSTEM ARCHITECTURE & RESET
           ========================================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; 
            background: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; 
        }

        /* ==========================================================================================
           2. MATHEMATICAL HSL RAINBOW ENGINE (LIQUID MOTION)
           ========================================================================================== */
        .ambient-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .rainbow-blob {
            position: absolute;
            width: 70vw; height: 70vw;
            border-radius: 50%;
            filter: blur(160px);
            opacity: 0.7;
            will-change: transform, background;
            transition: background 0.1s linear;
        }

        /* ==========================================================================================
           3. IOS-STYLE GLASS INTERFACE
           ========================================================================================== */
        .viewport { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; gap: 30px; 
        }
        
        .glass-pill {
            position: relative;
            width: 90%; max-width: 700px; height: 95px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 60px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.4rem; font-weight: 700;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-transform: uppercase; letter-spacing: 2px;
        }

        .glass-pill:hover {
            transform: scale(1.03) translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* ==========================================================================================
           4. FULLSCREEN OVERLAY & LIQUID VOLUME CONTROLS
           ========================================================================================== */
        #videoOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(50px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; transition: opacity 0.7s ease;
        }

        #mainVideo { width: 100%; height: 100%; object-fit: contain; }

        .controls {
            position: absolute; bottom: 50px; display: flex; align-items: center; gap: 20px;
            padding: 20px 40px; background: rgba(255,255,255,0.1); border-radius: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2);
        }

        .x-close {
            position: absolute; top: 40px; right: 40px; width: 60px; height: 60px;
            background: rgba(255,255,255,0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 25px; cursor: pointer; transition: 0.3s;
            z-index: 1001;
        }

        .x-close:hover { background: rgba(255,255,255,0.3); transform: rotate(90deg); }
        input[type=range] { width: 200px; cursor: pointer; accent-color: white; }
    </style>
</head>
<body>

    <div class="ambient-wrapper">
        <div class="rainbow-blob" style="top: -20%; left: -10%;"></div>
        <div class="rainbow-blob" style="bottom: -20%; right: -10%;"></div>
        <div class="rainbow-blob" style="top: 40%; left: 30%;"></div>
    </div>

    <div class="viewport">
        <button class="glass-pill" onclick="openVideo('Funny.mp4')">Commercial One</button>
        <button class="glass-pill" onclick="openVideo('commercial.mp4')">Commercial Two</button>
        <button class="glass-pill" onclick="openVideo('c3.mp4')">Commercial Three</button>
    </div>

    <div id="videoOverlay">
        <div class="x-close" onclick="closeVideo()">✕</div>
        <video id="mainVideo"></video>
        <div class="controls">
            <span style="color:white; font-weight:bold;">VOLUME</span>
            <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="setVol(this.value)">
        </div>
    </div>

    <script>
        /* ==========================================================================================
           5. HSL MATH CYCLE & SYSTEM LOGIC
           ========================================================================================== */
        let hue = 0;
        const blobs = document.querySelectorAll('.rainbow-blob');

        function animateHSL() {
            hue = (hue + 0.5) % 360;
            blobs.forEach((b, i) => {
                b.style.background = `hsl(${(hue + (i * 120)) % 360}, 80%, 50%)`;
            });
            requestAnimationFrame(animateHSL);
        }
        animateHSL();

        const ov = document.getElementById('videoOverlay');
        const vid = document.getElementById('mainVideo');

        function openVideo(src) {
            vid.src = src;
            ov.style.display = 'flex';
            requestAnimationFrame(() => { ov.style.opacity = '1'; });
            vid.play();
        }

        function closeVideo() {
            ov.style.opacity = '0';
            setTimeout(() => {
                vid.pause();
                vid.src = '';
                ov.style.display = 'none';
            }, 700);
        }

        function setVol(val) { vid.volume = val; }

        window.onkeydown = (e) => { if(e.key === 'Escape') closeVideo(); };
    </script>
</body>
</html>
