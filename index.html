<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍟</text></svg>">
    <title>Jaap-Commerical</title>
    <style>
        /* ==========================================================================================
           1. CORE SYSTEM ARCHITECTURE & RESET
           ========================================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; min-height: 100%; 
            /* Animated Rainbow Background Gradient */
            background: linear-gradient(-45deg, #ff0055, #ffcc00, #33ff33, #00ffff, #0066ff, #cc00ff);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow-x: hidden; 
            color: #000000; /* Forces global text to black */
        }
        /* Custom Glass Scrollbar for Chrome, Safari, and Edge */
                    ::-webkit-scrollbar {
                width: 16px; /* Wider so it's super easy to see and grab */
            }
            ::-webkit-scrollbar-track {
                background: rgba(255, 255, 255, 0.08); 
                backdrop-filter: blur(40px);
                -webkit-backdrop-filter: blur(40px);
                border-left: 1px solid rgba(255, 255, 255, 0.2);
            }
            ::-webkit-scrollbar-thumb {
                /* High-contrast neon rainbow gradient directly on the scrollbar handle */
                background: linear-gradient(180deg, #ff0055, #ffcc00, #33ff33, #00ffff, #0066ff, #cc00ff);
                border-radius: 50px;
                border: 3px solid rgba(255, 255, 255, 0.4); /* Chunky glass rim look */
                box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.6), 0 0 15px rgba(0, 0, 0, 0.5);
            }
            ::-webkit-scrollbar-thumb:hover {
                border-color: rgba(255, 255, 255, 0.8);
                box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.9), 0 0 25px rgba(255, 255, 255, 0.6);
                cursor: pointer;
            }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ==========================================================================================
           2. MATHEMATICAL HSL RAINBOW OVERLAY LAYER
           ========================================================================================== */
        .ambient-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .glass-pill {
            color: #000000 !important;
        }
        .rainbow-blob {
            position: absolute;
            width: 70vw; height: 70vw;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            will-change: transform, background;
            transition: background 0.1s linear;
        }

        /* ==========================================================================================
           3. IOS-STYLE GLASS INTERFACE & SEARCH BAR
           ========================================================================================== */
        .search-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .glass-search {
            width: 95%;             /* Fluid coverage for smaller panels */
            max-width: 1100px;      /* Pushed past the 900px glass pill boundaries */
            padding: 25px 40px;     /* Chunkier field height design */
            font-size: 1.8rem;      /* Huge legible search text */
            font-weight: 700;
            color: #000000;         /* Typing text color changed to solid black */
            background: rgba(255, 255, 255, 0.25); /* Slightly darker white glass base for better contrast with black text */
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            letter-spacing: 1px;
        }

        /* Changes the placeholder helper text color to dark charcoal grey */
        .glass-search::placeholder {
            color: rgba(0, 0, 0, 0.6);
        }

        .glass-search:focus {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            transform: scale(1.02);
        }

        .viewport { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px 0 100px 0; 
            gap: 20px; 
        }
        video::-webkit-media-controls {
            zoom: 1.25; /* Enlarges the play, pause, fullscreen, and download buttons safely without cutting them off */
        }
        
                 .glass-pill {
            position: relative;
            width: 90%; 
            max-width: 900px;       /* 2x width expansion from original 500px architecture */
            height: 120px;          /* Massive 2x chunkier target field */
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 2px solid rgba(255, 255, 255, 0.35); /* Solid glass outline */
            border-radius: 60px;    /* Keeps the perfect capsule form factor */
            display: flex; align-items: center; justify-content: center;
            color: white; 
            font-size: 2.2rem;      /* Huge text size so the brand labels look massive */
            font-weight: 800;       /* Extra bold stance */
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Snappy bounce effect */
            box-shadow: 0 15px 35px rgba(0,0,0,0.25), inset 0 0 15px rgba(255,255,255,0.2);
            text-transform: uppercase; 
            letter-spacing: 3px;
        }
        /* ==========================================================================================
   ULTRA-ADAPTIVE FULL-SCREEN LOGO BACKGROUND MASK OVERLAY
   ========================================================================================== */
        .background-logo-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;         /* Sits directly above the body gradient, behind all text and buttons */
            pointer-events: none; /* Let's all user mouse clicks pass straight through to the pills */
            
            /* Image Loading & Formatting Core */
            background-image: url('logofinal.png'); 
            background-repeat: no-repeat;  /* Stops the image from repeating like tiles */
            background-position: center;   /* Anchors the center of the image directly to the middle of the screen */
            
            /* The Adaptive Coverage Secret Tweak */
            background-size: cover;        /* Scales the image dynamically so it always fills 100% width and height, bleeding off-screen to prevent white space */
            
            /* 80% Lightened Opacity Filter Blur */
            opacity: 0.2;                  /* 20% visibility (80% faded out) so the rainbow shifts through nicely */
        }
        
        .glass-pill:hover {
            transform: scale(1.04) translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,255,255,0.4);
        }

        /* ==========================================================================================
           4. VIDEO PLAYER CENTERED OVERLAY
           ========================================================================================== */
        #videoOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(30px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; transition: opacity 0.5s ease;
        }

        #mainVideo { 
            width: 95vw;             
            max-width: 90%;    /* Forces at least a 10% total background edge on ANY screen size */        
            max-height: 80vh;  /* Keeps the video from taller screens overflowing vertically */
            height: auto;
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            background: #000;
        }

        .controls {
            position: absolute; bottom: 50px; display: flex; align-items: center; gap: 20px;
            padding: 15px 35px; background: rgba(255,255,255,0.15); border-radius: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .x-close {
            position: absolute; top: 40px; right: 40px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.2); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 22px; cursor: pointer; transition: 0.3s;
            z-index: 1001;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .x-close:hover { 
            background: rgba(255,255,255,0.4); 
            transform: rotate(90deg); 
            border-color: rgba(255,255,255,0.6);
        }
        
        input[type=range] { width: 200px; cursor: pointer; accent-color: white; }
    </style>
</head>
<body>
    <div class="background-logo-mask"></div>
    <div style="text-align: center; padding: 50px 20px 10px 20px; color: #000000;">
        <h1 style="font-size: 3rem; text-transform: uppercase; margin-bottom: 10px;">Future Commercials</h1>
        <p style="font-size: 1.2rem; opacity: 0.8; letter-spacing: 2px;">A Collab made by Jaap and Gemini</p>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="glass-search" placeholder="Search for a commercial..." onkeyup="filterCommercials()">
        </div>
    </div>

    <div class="ambient-wrapper">
        <div class="rainbow-blob" style="top: -20%; left: -10%;"></div>
        <div class="rainbow-blob" style="bottom: -20%; right: -10%;"></div>
        <div class="rainbow-blob" style="top: 40%; left: 30%;"></div>
    </div>

    <div class="viewport" id="buttonContainer">
        <button class="glass-pill" onclick="openVideo('Funny.mp4')">McDonald's</button>
        <button class="glass-pill" onclick="openVideo('commercial.mp4')">McDonald's #2</button>
        <button class="glass-pill" onclick="openVideo('mp4.mp4')">McDonald's #3</button>
        <button class="glass-pill" onclick="openVideo('wendy.mp4')">Wendys #1</button>
        <button class="glass-pill" onclick="openVideo('wendy2.mp4')">Wendys #2</button>
        <button class="glass-pill" onclick="openVideo('kfc.mp4')">KFC</button>
        <button class="glass-pill" onclick="openVideo('domino.mp4')">Dominoes</button>
        <button class="glass-pill" onclick="openVideo('apple.mp4')">Apple</button>
        <button class="glass-pill" onclick="openVideo('chipotle.mp4')">Chipotle</button>
        <button class="glass-pill" onclick="openVideo('chipotle2.mp4')">Chipotle #2</button>
        <button class="glass-pill" onclick="openVideo('starbucks.mp4')">Starbucks</button>
        <button class="glass-pill" onclick="openVideo('Ford.mp4')">Ford</button>
        <button class="glass-pill" onclick="openVideo('coke.mp4')">Coca Cola</button>
        <button class="glass-pill" onclick="openVideo('nike.mp4')">Nike</button>
        <button class="glass-pill" onclick="openVideo('six.mp4')">Six Flags</button>
        <button class="glass-pill" onclick="openVideo('subway.mp4')">Subway</button>
        <button class="glass-pill" onclick="openVideo('amex.mp4')">American Express</button>
        <button class="glass-pill" onclick="openVideo('macbook.mp4')">Macbook</button>
        <button class="glass-pill" onclick="openVideo('allstate.mp4')">AllState</button>
        <button class="glass-pill" onclick="openVideo('burger.mp4')">Burger King #1</button>
        <button class="glass-pill" onclick="openVideo('burger2.mp4')">Burger King #2</button>
        <button class="glass-pill" onclick="openVideo('chevron.mp4')">Chevron</button>
        <button class="glass-pill" onclick="openVideo('chevron2.mp4')">Chevron #2</button>
        <button class="glass-pill" onclick="openVideo('dorito.mp4')">Doritoes</button>
        <button class="glass-pill" onclick="openVideo('dorito2.mp4')">Doritoes #2</button>
        <button class="glass-pill" onclick="openVideo('pepsi.mp4')">Pepsi</button>
        <button class="glass-pill" onclick="openVideo('pepsi2.mp4')">Pepsi #2</button>
        <button class="glass-pill" onclick="openVideo('doordash.mp4')">DoorDash</button>
    </div>

    <div id="videoOverlay">
        <div class="x-close" onclick="closeVideo()">✕</div>
        <video id="mainVideo" controls></video>
        <div class="controls">
            <span style="color:white; font-weight:bold; letter-spacing: 1px;">VOLUME</span>
            <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setVol(this.value)">
        </div>
    </div>

    <script>
        /* ==========================================================================================
           5. SEARCH FILTER ENGINE
           ========================================================================================== */
        function filterCommercials() {
            const input = document.getElementById('searchInput').value.toUpperCase();
            const buttons = document.querySelectorAll('.glass-pill');
            
            buttons.forEach(button => {
                const text = button.innerText.toUpperCase();
                if (text.indexOf(input) > -1) {
                    button.style.display = "flex";
                } else {
                    button.style.display = "none";
                }
            });
        }

        /* ==========================================================================================
           6. HSL MATH CYCLE FOR AMBIENT BLOB OVERLAYS 
           ========================================================================================== */
        let hue = 0;
        const blobs = document.querySelectorAll('.rainbow-blob');

        function animateHSL() {
            hue = (hue + 0.5) % 360;
            blobs.forEach((b, i) => {
                b.style.background = `hsl(${(hue + (i * 120)) % 360}, 80%, 50%)`;
            });
            requestAnimationFrame(animateHSL);
        }
        animateHSL();

        /* ==========================================================================================
           7. VIDEO OVERLAY & CONTROL LOGIC
           ========================================================================================== */
        const ov = document.getElementById('videoOverlay');
        const vid = document.getElementById('mainVideo');

        function openVideo(src) {
            vid.src = src;
            ov.style.display = 'flex';
            requestAnimationFrame(() => { ov.style.opacity = '1'; });
            vid.play();
        }

        function closeVideo() {
            ov.style.opacity = '0';
            setTimeout(() => {
                vid.pause();
                vid.src = '';
                ov.style.display = 'none';
            }, 500);
        }

        function setVol(val) { vid.volume = val; }

        window.onkeydown = (e) => { if(e.key === 'Escape') closeVideo(); };
    </script>
</body>
</html>
